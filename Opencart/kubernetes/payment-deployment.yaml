apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: chumb599/opencart-payment:latest 
          ports:
            - containerPort: 6000
          env:
            - name: PORT
              value: "6000"
